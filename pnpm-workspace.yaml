packages:
    # logservice is a Bun project (own bun.lock) and is intentionally NOT a pnpm
    # workspace member, so pnpm and Bun don't fight over its node_modules.
    - mailgw

pnpm:
    minimumReleaseAge: 10080
    blockExoticSubdeps: true

# Haraka 3.3.1 and its freshly-published deps are exempted from the 7-day
# maturity window so the upgrade can resolve. Trim this list once they age out.
minimumReleaseAgeExclude:
    - Haraka
    - "haraka-*"
    - semver

allowBuilds:
    modern-syslog: true
