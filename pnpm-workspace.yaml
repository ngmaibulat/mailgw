packages:
    # logservice/ and tests/ are Bun projects (own bun.lock) and are
    # intentionally NOT pnpm workspace members, so pnpm and Bun don't fight over
    # their node_modules. mailgw/, webui-express/ and webui-fastify/ are
    # Node/pnpm packages. webui-fastify is the Fastify rewrite of webui-express
    # (kept side by side during the migration).
    - mailgw
    - webui-express
    - webui-fastify

pnpm:
    minimumReleaseAge: 10080
    blockExoticSubdeps: true

# Haraka 3.3.1 and its freshly-published deps are exempted from the 7-day
# maturity window so the upgrade can resolve. Trim this list once they age out.
minimumReleaseAgeExclude:
    - Haraka
    - "haraka-*"
    - semver

allowBuilds:
    modern-syslog: true
