services:
    mailgw:
        image: ngmaibulat/mailgw:latest
        container_name: dev-mailgw
        restart: unless-stopped
        ports:
            - "25:25"
        environment:
            # Must match the logservice API_KEY so the plugins authenticate.
            API_KEY: ${API_KEY:-}
        volumes:
            - ./mailgw/plugins:/opt/mailgw/plugins
            - /opt/mailgw/config:/opt/mailgw/config
            - /opt/mailgw/log:/opt/mailgw/log
            - /opt/mailgw/queue:/opt/mailgw/queue

    mariadb:
        image: mariadb:12
        container_name: dev-mailgw-db
        restart: unless-stopped
        ports:
            - "3306:3306"
        environment:
            MARIADB_ROOT_PASSWORD: P@ssw0rd
            MARIADB_DATABASE: mailgw
            MARIADB_USER: mailgw
            MARIADB_PASSWORD: P@ssw0rd
        volumes:
            # Docker-managed named volume only — no host bind mounts.
            - mariadb_data:/var/lib/mysql
        # healthcheck (commented): gates dependents on real DB readiness. The
        # migrator now retries the connection itself, so this is optional —
        # uncomment (and the service_healthy depends_on below) to re-enable.
        # healthcheck:
        #     test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
        #     interval: 5s
        #     timeout: 5s
        #     retries: 12
        #     start_period: 30s

    logservice:
        image: ngmaibulat/logservice:latest
        container_name: dev-logservice
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            PORT: 3000
            # Enables X-API-Key auth when set; leave empty to accept all.
            API_KEY: ${API_KEY:-}
            DB_HOST: dev-mailgw-db
            DB_NAME: mailgw
            DB_USER: mailgw
            DB_PASS: P@ssw0rd
        depends_on:
            db-migrator:
                condition: service_completed_successfully

    webui:
        image: ngmaibulat/mailgw-webui:latest
        container_name: dev-webui
        restart: unless-stopped
        ports:
            - "4000:4000" # admin UI (HTTP/2 over TLS)
        environment:
            NODE_ENV: production
            PORT: 4000
            # Signs the session cookie — override in real deployments.
            SIGN_COOKIE: ${SIGN_COOKIE:-changeme}
            TEMPLATE_ENGINE: pug
            DB_DRIVER: mysql
            DB_HOST: dev-mailgw-db
            DB_NAME: mailgw
            DB_USER: mailgw
            DB_PASS: P@ssw0rd
        volumes:
            # The server serves HTTP/2 over TLS and reads ./certs/server.{key,crt}
            # on boot; provide them here. Create the dir + certs before `up`.
            - ./webui-express/certs:/app/certs:ro
        depends_on:
            db-migrator:
                condition: service_completed_successfully

    db-migrator:
        image: ngmaibulat/logservice:latest
        container_name: dev-mailgw-db-migrator
        command: ["bun", "src/dbmigrate.ts"]
        environment:
            DB_HOST: dev-mailgw-db
            DB_NAME: mailgw
            DB_USER: mailgw
            DB_PASS: P@ssw0rd
        depends_on:
            - mariadb
            # With the healthcheck above commented out, this falls back to plain
            # start ordering; the migrator's own connection retry handles
            # readiness. Re-enable alongside the healthcheck to gate strictly:
            # mariadb:
            #     condition: service_healthy

    mailhog:
        image: mailhog/mailhog
        container_name: dev-mailhog
        restart: unless-stopped
        ports:
            - "8025:8025" # MailHog web interface
            - "1025:1025" # MailHog SMTP server

volumes:
    mariadb_data:
